<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Search Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --accent-hover: #60a5fa;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.5s ease;
        }

        .header {
            margin-top: 20vh;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Когда есть результаты, поднимаем заголовок наверх */
        body.has-results .header {
            margin-top: 2rem;
            transform: scale(0.8);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0 0 1.5rem 0;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .search-box {
            width: 100%;
            position: relative;
            display: flex;
            gap: 1rem;
            background: var(--card-bg);
            padding: 0.5rem;
            border-radius: 99px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .search-box:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 0.5rem 1.5rem;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 99px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .results {
            width: 100%;
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        body.has-results .results {
            opacity: 1;
            transform: translateY(0);
        }

        .result-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .result-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(96, 165, 250, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .result-title {
            color: #60a5fa;
            font-size: 1.25rem;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 0.5rem;
            display: inline-block;
            transition: color 0.2s;
        }

        .result-title:hover {
            color: #93c5fd;
            text-decoration: underline;
        }

        .result-url {
            color: #34d399;
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-snippet {
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.5;
        }

        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .no-results {
            text-align: center;
            color: #94a3b8;
            font-size: 1.2rem;
            margin-top: 2rem;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Nexus Search</h1>
        </div>
        
        <form class="search-box" id="searchForm">
            <input type="text" id="searchInput" placeholder="Введите поисковой запрос..." autocomplete="off" autofocus>
            <button type="submit">Поиск</button>
        </form>

        <div class="loader" id="loader"></div>
        <div class="results" id="resultsContainer"></div>
    </div>

    <script>
        const form = document.getElementById('searchForm');
        const input = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const loader = document.getElementById('loader');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = input.value.trim();
            if (!query) return;

            document.body.classList.add('has-results');
            resultsContainer.innerHTML = '';
            loader.style.display = 'block';

            try {
                const response = await fetch(`/api/v1/search?q=${encodeURIComponent(query)}`);
                const results = await response.json();
                
                loader.style.display = 'none';

                if (results.length === 0) {
                    resultsContainer.innerHTML = '<div class="no-results">По вашему запросу ничего не найдено :(</div>';
                    return;
                }

                results.forEach((result, index) => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.style.animationDelay = `${index * 0.1}s`;
                    
                    const title = result.title || result.url;
                    
                    card.innerHTML = `
                        <a href="${result.url}" target="_blank" class="result-title">${title}</a>
                        <div class="result-url">${result.url}</div>
                        <div class="result-snippet">${result.snippet}...</div>
                    `;
                    resultsContainer.appendChild(card);
                });

            } catch (error) {
                loader.style.display = 'none';
                resultsContainer.innerHTML = '<div class="no-results" style="color: #ef4444;">Ошибка при выполнении поиска. Проверьте запущен ли бэкенд.</div>';
                console.error('Search error:', error);
            }
        });
    </script>
</body>
</html>
