name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Запускаем сервисы, необходимые для интеграционных тестов
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: crawler
          POSTGRES_USER: crawler_user
          POSTGRES_PASSWORD: crawler_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.12-alpine
        ports:
          - 5672:5672

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
          
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
        env:
          discovery.type: single-node
          xpack.security.enabled: false
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports:
          - 9200:9200

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test Common Module
      run: mvn -B clean install -pl common

    - name: Build and Test Crawler Core Module
      run: mvn -B clean install -pl crawler-core

    - name: Build and Test Crawler Worker Module
      run: mvn -B clean install -pl crawler-worker

    - name: Build and Test Search API Module
      run: mvn -B clean install -pl search-api

    - name: Build Whole Project
      run: mvn -B clean package
